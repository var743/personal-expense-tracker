<!DOCTYPE html>
<html>
<head>
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Personal Expense Tracker</h1>
            <div>
                <span id="welcomeUser" style="margin-right: 15px;"></span>
                <button onclick="logout()" style="padding: 8px 15px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Logout</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="card">
                <h3>Salary</h3>
                <p id="salaryCard">₹0</p>
            </div>
            <div class="card">
                <h3>Expense</h3>
                <p id="expenseCard">₹0</p>
            </div>
            <div class="card">
                <h3>Balance</h3>
                <p id="balanceCard">₹0</p>
            </div>
            <div class="card">
                <h3>Budget Analysis</h3>
                <p id="budgetAnalysis">0%</p>
            </div>
            
        </div>

        <label>Salary:</label>
        <input type="number" id="salary" placeholder="Enter Salary">
        <br><br>
        

        <label>Category:</label>
        <select id="category">
            <option>Food</option>n
            <option>Travel</option>
            <option>rent</option>
            <option>fuel</option>
            <option>recharge</option>
            <option>education</option>
            <option>medical</option>
            <option>entertainment</option>
            <option>loan</option>
            <option>savings</option>
            <option>others</option>
        </select>
        <br><br>

        <label>Amount:</label>
        <input type="number" id="amount" placeholder="Enter Amount">
        <br><br>

        <button onclick="addExpense()">Add Expense</button>
        
        <h2>Expenses List</h2>
        <table border="1" align="center">
            <thead>
                <tr>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="expenseList"></tbody>
        </table>

        <h3>Total Expense: ₹<span id="totalExpense">0</span></h3>
        <h3>Balance: ₹<span id="balance">0</span></h3>
        <h3>Total Expense: ₹<span id="totalExpense">0</span></h3>

        <!-- ADD HISTORY BUTTON HERE - AFTER TOTAL, BEFORE CHART -->
         <button onclick="showHistory()">
           Show History
         </button>
         <div id="historySection" style="display:none;">
            <h2>Expense History</h2>

            <table id="historyTable">
              <tr>
                 <th>Category</th>
                 <th>Amount</th>
             </tr>
            </table>
         </div>
        
        <h2>Expense Analysis</h2>
        <canvas id="expenseChart" width="400" height="400"></canvas>
        <tbody id="expenseTableBody"></tbody>
        <h3 id="totalExpense">Total: ₹0</h3>


        <h2>Expense Analysis</h2>
        <canvas id="expenseChart" width="400" height="400"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
